backend:
  name: github
  repo: rouainabdu24-sketch/easydeutschkitchen
  branch: main
  auth_type: pkce
  app_id: Ov23liDaFEXBwZp7Opdb

media_folder: public/images
public_folder: /images

collections:
  - name: recipes
    label: Rezepte
    folder: src/content/recipes
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschreibung, name: description, widget: text }
      - { label: Veröffentlichungsdatum, name: pubDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Aktualisierungsdatum, name: updatedDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - label: Kategorie
        name: category
        widget: select
        options:
          - { label: Hauptgerichte, value: hauptgerichte }
          - { label: Suppen, value: suppen }
          - { label: Backwaren, value: backwaren }
          - { label: Desserts, value: desserts }
          - { label: Frühstück, value: fruehstueck }
          - { label: Beilagen, value: beilagen }
          - { label: Snacks, value: snacks }
      - { label: Tags, name: tags, widget: list, min: 1, max: 15 }
      - { label: Hauptbild URL, name: heroImage, widget: string }
      - { label: Hauptbild Alt-Text, name: heroImageAlt, widget: string }
      - { label: Mittelbild URL, name: midImage, widget: string, required: false }
      - { label: Mittelbild Alt-Text, name: midImageAlt, widget: string, required: false }
      - { label: Weiteres Bild URL, name: prompteImage, widget: string, required: false }
      - { label: Vorbereitungszeit (Min), name: prepTime, widget: number, value_type: int, min: 1 }
      - { label: Kochzeit (Min), name: cookTime, widget: number, value_type: int, min: 1 }
      - { label: Portionen, name: servings, widget: number, value_type: int, min: 1 }
      - label: Schwierigkeitsgrad
        name: difficulty
        widget: select
        options:
          - { label: Einfach, value: einfach }
          - { label: Mittel, value: mittel }
          - { label: Schwer, value: schwer }
      - label: Zutaten
        name: ingredients
        widget: list
        min: 1
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Menge, name: amount, widget: number, value_type: float, required: false }
          - { label: Einheit, name: unit, widget: string, required: false }
          - { label: Hinweis, name: note, widget: string, required: false }
      - label: Nährwerte
        name: nutrition
        widget: object
        fields:
          - { label: Kalorien (kcal), name: calories, widget: number, value_type: int, min: 0 }
          - { label: Protein (g), name: protein, widget: number, value_type: float, min: 0 }
          - { label: Fett (g), name: fat, widget: number, value_type: float, min: 0 }
          - { label: Kohlenhydrate (g), name: carbs, widget: number, value_type: float, min: 0 }
          - { label: Ballaststoffe (g), name: fiber, widget: number, value_type: float, min: 0, required: false }
          - { label: Zucker (g), name: sugar, widget: number, value_type: float, min: 0, required: false }
          - { label: Natrium (mg), name: sodium, widget: number, value_type: float, min: 0, required: false }
      - label: FAQ
        name: faq
        widget: list
        required: false
        fields:
          - { label: Frage, name: question, widget: string }
          - { label: Antwort, name: answer, widget: text }
      - { label: Autor, name: author, widget: string, default: lena-bauer }
      - { label: Empfohlen, name: featured, widget: boolean, default: false }
      - { label: Entwurf, name: draft, widget: boolean, default: false }
      - { label: Inhalt, name: body, widget: markdown }
