backend:
  name: github
  repo: rouainabdu24-sketch/easydeutschkitchen
  branch: main
  app_id: Ov23liDaFEXBwZp7Opdb

media_folder: public/images
public_folder: /images

collections:
  - name: recipes
    label: Recipes
    folder: src/content/recipes
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Updated Date, name: updatedDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - label: Category
        name: category
        widget: select
        options:
          - { label: Main Dishes, value: hauptgerichte }
          - { label: Soups, value: suppen }
          - { label: Baked Goods, value: backwaren }
          - { label: Desserts, value: desserts }
          - { label: Breakfast, value: fruehstueck }
          - { label: Side Dishes, value: beilagen }
          - { label: Snacks, value: snacks }
      - { label: Tags, name: tags, widget: list, min: 1, max: 15 }
      - { label: Hero Image URL, name: heroImage, widget: string }
      - { label: Hero Image Alt Text, name: heroImageAlt, widget: string }
      - { label: Mid Image URL, name: midImage, widget: string, required: false }
      - { label: Mid Image Alt Text, name: midImageAlt, widget: string, required: false }
      - { label: Extra Image URL, name: prompteImage, widget: string, required: false }
      - { label: Prep Time (min), name: prepTime, widget: number, value_type: int, min: 1 }
      - { label: Cook Time (min), name: cookTime, widget: number, value_type: int, min: 1 }
      - { label: Servings, name: servings, widget: number, value_type: int, min: 1 }
      - label: Difficulty
        name: difficulty
        widget: select
        options:
          - { label: Easy, value: einfach }
          - { label: Medium, value: mittel }
          - { label: Hard, value: schwer }
      - label: Ingredients
        name: ingredients
        widget: list
        min: 1
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Amount, name: amount, widget: number, value_type: float, required: false }
          - { label: Unit, name: unit, widget: string, required: false }
          - { label: Note, name: note, widget: string, required: false }
      - label: Nutrition
        name: nutrition
        widget: object
        fields:
          - { label: Calories (kcal), name: calories, widget: number, value_type: int, min: 0 }
          - { label: Protein (g), name: protein, widget: number, value_type: float, min: 0 }
          - { label: Fat (g), name: fat, widget: number, value_type: float, min: 0 }
          - { label: Carbs (g), name: carbs, widget: number, value_type: float, min: 0 }
          - { label: Fiber (g), name: fiber, widget: number, value_type: float, min: 0, required: false }
          - { label: Sugar (g), name: sugar, widget: number, value_type: float, min: 0, required: false }
          - { label: Sodium (mg), name: sodium, widget: number, value_type: float, min: 0, required: false }
      - label: FAQ
        name: faq
        widget: list
        required: false
        fields:
          - { label: Question, name: question, widget: string }
          - { label: Answer, name: answer, widget: text }
      - { label: Author, name: author, widget: string, default: lena-bauer }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Content, name: body, widget: markdown }
